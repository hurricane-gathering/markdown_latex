name: markdown_latex
description: >-
  Polished Flutter Markdown + LaTeX mixed renderer. GFM, inline/block math,
  syntax-highlighted code, edit/preview editor, Light/Dark themes — Notion style.
version: 0.1.3
homepage: https://github.com/hurricane-gathering/markdown_latex
repository: https://github.com/hurricane-gathering/markdown_latex
issue_tracker: https://github.com/hurricane-gathering/markdown_latex/issues

topics:
  - markdown
  - latex
  - math
  - mixed-rendering
  - syntax-highlighting

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5
  flutter_markdown: ^0.7.0
  flutter_highlight: ^0.7.0
  flutter_math_fork: ^0.7.0
  url_launcher: ^6.0.0
  markdown: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
