name: markdown_latex
description: >-
  Flutter Markdown + LaTeX mixed renderer. GFM, inline/block math, syntax-highlighted
  code blocks, task lists, tables, edit/preview editor — Notion / GitHub styling.
version: 0.1.0
homepage: https://github.com/hurricane-gathering/elegant_markdown
repository: https://github.com/hurricane-gathering/elegant_markdown
issue_tracker: https://github.com/hurricane-gathering/elegant_markdown/issues

topics:
  - markdown
  - latex
  - math
  - syntax-highlighting
  - text-rendering

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5
  flutter_markdown: ^0.7.0
  flutter_highlight: ^0.7.0
  flutter_math_fork: ^0.7.0
  url_launcher: ^6.0.0
  markdown: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
